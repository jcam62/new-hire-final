<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />

    <title>Document</title>
  </head>
  <body>
    <div class="grid-container-visit-us">
      <div class="box_header">
        <div id="header">
        Serene Beans<br />Katy's Local Coffee Shop
        <nav class="navbar">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html">Gallery</a></li>
            <li><a href="visitus.html">Visit Us</a></li>
          </ul>
        </nav>
      </div>
      </div>
      <div class="box">
        Visit us in Katy Monday - Friday!
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3462.62638537552!2d-95.82559878761207!3d29.78844303054836!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864125d35d4c6809%3A0x55694e4e5e40076d!2sSerene%20Beans!5e0!3m2!1sen!2sus!4v1777692375830!5m2!1sen!2sus"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
      <div class="box">
        <div id="contact_form">
        <p>Want to get in contact? Use this form!</p>
        <div id="form_submission">
        <form action="your-backend-url" method="POST">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your Name"
            required
          />

          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="email@example.com"
            required
          />

          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="3" required></textarea>

          <button type="submit">Submit!</button>
          </div>
        </form>
        </div>
      </div>
    </div>
  </body>
</html>
